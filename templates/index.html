<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cluedo AI Solver 🕵️‍♂️</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .card-indice { border-left: 4px solid #0d6efd; margin-bottom: 8px; transition: 0.2s; }
        .card-indice:hover { background-color: #f8f9fa; }
        .solution-box { font-size: 1.25rem; font-weight: bold; min-height: 80px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow mb-3">
                <div class="card-header bg-dark text-white fw-bold">⚙️ Configuration</div>
                <div class="card-body">
                    <label class="small fw-bold">Nombre de joueurs au total :</label>
                    <select id="n_joueurs" class="form-select mb-3" onchange="updatePlayersList()">
                        <option value="3">3 Joueurs</option>
                        <option value="4" selected>4 Joueurs</option>
                        <option value="5">5 Joueurs</option>
                        <option value="6">6 Joueurs</option>
                    </select>
                    
                    <label class="small fw-bold">Ajouter mes cartes (Ma main) :</label>
                    <div class="input-group">
                        <select id="ma_carte_select" class="form-select">
                            {% for c in suspects + armes + lieux %}<option value="{{c}}">{{c}}</option>{% endfor %}
                        </select>
                        <button class="btn btn-primary" onclick="addIndice('possession_directe', 0)">Ajouter</button>
                    </div>
                </div>
            </div>

            <div class="card shadow">
                <div class="card-header bg-primary text-white fw-bold">📝 Journal des tours</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="small fw-bold">Qui a répondu ?</label>
                        <select id="joueur_select" class="form-select"></select>
                    </div>
                    
                    <div class="row g-2 mb-3">
                        <div class="col"><select id="s_s" class="form-select">{% for c in suspects %}<option>{{c}}</option>{% endfor %}</select></div>
                        <div class="col"><select id="s_a" class="form-select">{% for c in armes %}<option>{{c}}</option>{% endfor %}</select></div>
                        <div class="col"><select id="s_l" class="form-select">{% for c in lieux %}<option>{{c}}</option>{% endfor %}</select></div>
                    </div>

                    <div class="d-grid gap-2">
                        <button onclick="addIndice('positif')" class="btn btn-warning">A montré une carte</button>
                        <button onclick="addIndice('negatif')" class="btn btn-danger">N'a rien montré (Passé)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow mb-3">
                <div class="card-header bg-success text-white d-flex justify-content-between">
                    🔍 Indices enregistrés
                    <button class="btn btn-sm btn-outline-light" onclick="removeLast()">Annuler le dernier</button>
                </div>
                <div class="card-body" id="indices_list" style="height: 300px; overflow-y: auto;">
                    <p class="text-muted text-center mt-5">Aucun indice pour le moment.</p>
                </div>
            </div>

            <button onclick="solve()" class="btn btn-dark btn-lg w-100 mb-3 shadow">CALCULER LE COUPABLE</button>

            <div id="result_area" class="alert alert-secondary solution-box shadow-sm">
                En attente d'indices suffisants...
            </div>
        </div>
    </div>
</div>

<script>
    let indices = [];

    function updatePlayersList() {
        const n = document.getElementById('n_joueurs').value;
        const select = document.getElementById('joueur_select');
        select.innerHTML = "";
        for(let i=1; i < n; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = "Joueur " + i;
            select.appendChild(opt);
        }
        indices = []; render();
    }

    function addIndice(type, forceJoueur = null) {
        const j = (forceJoueur !== null) ? forceJoueur : document.getElementById('joueur_select').value;
        let cards = [];
        if(type === 'possession_directe') {
            cards = [document.getElementById('ma_carte_select').value];
        } else {
            cards = [document.getElementById('s_s').value, document.getElementById('s_a').value, document.getElementById('s_l').value];
        }
        indices.push({type, joueur: j, cartes: cards});
        render();
    }

    function removeLast() { indices.pop(); render(); }

    function render() {
        const list = document.getElementById('indices_list');
        if(indices.length === 0) { list.innerHTML = '<p class="text-muted text-center mt-5">Aucun indice.</p>'; return; }
        list.innerHTML = indices.map((ind, i) => `
            <div class="card-indice p-2 bg-white rounded shadow-sm">
                <span class="badge bg-secondary">#${i+1}</span> 
                <strong>${ind.joueur == 0 ? 'Moi' : 'Joueur '+ind.joueur}</strong> : 
                ${ind.type === 'positif' ? 'Possède au moins un de' : (ind.type === 'negatif' ? 'N\'a aucun de' : 'A la carte')} 
                <span class="text-primary">${ind.cartes.join(', ')}</span>
            </div>
        `).join('');
    }

    async function solve() {
        const btn = document.querySelector('button[onclick="solve()"]');
        btn.disabled = true;
        const resArea = document.getElementById('result_area');
        
        try {
            const response = await fetch('/solve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({indices: indices, n_joueurs: document.getElementById('n_joueurs').value})
            });
            const data = await response.json();
            if(data.status === "found") {
                resArea.className = "alert alert-success solution-box shadow";
                resArea.innerHTML = `✅ SOLUTION : ${data.solution.coupable} + ${data.solution.arme} + ${data.solution.lieu}`;
            } else {
                resArea.className = "alert alert-warning solution-box shadow-sm";
                resArea.innerText = "🕵️ Pas encore de certitude mathématique...";
            }
        } finally { btn.disabled = false; }
    }

    updatePlayersList();
</script>
</body>
</html>
