<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluedo AI Master Solver 🕵️‍♂️</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .card-indice { border-left: 5px solid #0d6efd; margin-bottom: 8px; background: #fff; transition: transform 0.1s; }
        .card-indice:hover { transform: translateX(5px); }
        .solution-box { min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hypothese-list { max-height: 200px; overflow-y: auto; width: 100%; margin-top: 10px; }
        .badge-count { font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm mb-3 border-info">
                <div class="card-body">
                    <label class="form-label fw-bold">⚙️ Configuration de la partie</label>
                    <div class="row g-2">
                        <div class="col-8">
                            <select id="n_joueurs" class="form-select" onchange="resetGame()">
                                <option value="3">3 Joueurs</option>
                                <option value="4" selected>4 Joueurs</option>
                                <option value="5">5 Joueurs</option>
                                <option value="6">6 Joueurs</option>
                            </select>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-outline-danger w-100" onclick="resetGame()">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-3">
                <div class="card-header bg-primary text-white">🗂 Ma Main & Déductions Directes</div>
                <div class="card-body">
                    <div class="input-group">
                        <select id="ma_carte_select" class="form-select">
                            <optgroup label="Suspects">
                                {% for c in suspects %}<option value="{{c}}">{{c}}</option>{% endfor %}
                            </optgroup>
                            <optgroup label="Armes">
                                {% for c in armes %}<option value="{{c}}">{{c}}</option>{% endfor %}
                            </optgroup>
                            <optgroup label="Lieux">
                                {% for c in lieux %}<option value="{{c}}">{{c}}</option>{% endfor %}
                            </optgroup>
                        </select>
                        <button class="btn btn-primary" onclick="addIndice('possession_directe', 0)">Ajouter</button>
                    </div>
                    <small class="text-muted">Utilisez ceci pour vos cartes de départ.</small>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">🕵️‍♂️ Tour de table (Suggestions)</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="small fw-bold">Qui a répondu à la suggestion ?</label>
                        <select id="joueur_select" class="form-select"></select>
                    </div>
                    
                    <div class="row g-2 mb-3">
                        <div class="col"><select id="s_s" class="form-select">{% for c in suspects %}<option>{{c}}</option>{% endfor %}</select></div>
                        <div class="col"><select id="s_a" class="form-select">{% for c in armes %}<option>{{c}}</option>{% endfor %}</select></div>
                        <div class="col"><select id="s_l" class="form-select">{% for c in lieux %}<option>{{c}}</option>{% endfor %}</select></div>
                    </div>

                    <div class="d-grid gap-2">
                        <button onclick="addIndice('positif')" class="btn btn-warning fw-bold">A montré UNE carte</button>
                        <button onclick="addIndice('negatif')" class="btn btn-outline-danger">N'a RIEN montré (Passé)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    📖 Historique des indices
                    <button class="btn btn-sm btn-light" onclick="removeLast()">Undo</button>
                </div>
                <div class="card-body" id="indices_list" style="height: 250px; overflow-y: auto;">
                    <p class="text-muted text-center mt-5">La liste est vide.</p>
                </div>
            </div>

            <div class="card shadow-sm mb-3">
                <div class="card-body bg-light border">
                    <label class="form-label small fw-bold">Seuil d'affichage des hypothèses : <span id="seuil_val" class="badge bg-primary">5</span></label>
                    <input type="range" class="form-range" min="1" max="15" value="5" id="seuil_range" 
                           oninput="document.getElementById('seuil_val').innerText = this.value">
                </div>
            </div>

            <button onclick="solve()" id="solve_btn" class="btn btn-success btn-lg w-100 mb-3 shadow fw-bold">LANCER L'ANALYSE CSP</button>

            <div id="result_area" class="alert alert-secondary solution-box shadow-sm">
                En attente d'analyse...
            </div>
        </div>
    </div>
</div>

<script>
    let indices = [];

    function updatePlayersList() {
        const n = document.getElementById('n_joueurs').value;
        const select = document.getElementById('joueur_select');
        select.innerHTML = "";
        for(let i=1; i < n; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerText = "Joueur " + i;
            select.appendChild(opt);
        }
    }

    function resetGame() {
        indices = [];
        updatePlayersList();
        render();
        document.getElementById('result_area').innerHTML = "Partie réinitialisée.";
        document.getElementById('result_area').className = "alert alert-secondary solution-box shadow-sm";
    }

    function addIndice(type, forceJoueur = null) {
        const j = (forceJoueur !== null) ? forceJoueur : document.getElementById('joueur_select').value;
        let cards = [];
        if(type === 'possession_directe') {
            cards = [document.getElementById('ma_carte_select').value];
        } else {
            cards = [document.getElementById('s_s').value, document.getElementById('s_a').value, document.getElementById('s_l').value];
        }
        indices.push({type, joueur: j, cartes: cards});
        render();
    }

    function removeLast() {
        indices.pop();
        render();
    }

    function render() {
        const list = document.getElementById('indices_list');
        if(indices.length === 0) {
            list.innerHTML = '<p class="text-muted text-center mt-5">Aucun indice enregistré.</p>';
            return;
        }
        list.innerHTML = indices.map((ind, i) => `
            <div class="card-indice p-2 shadow-sm rounded">
                <span class="badge bg-secondary text-white">#${i+1}</span> 
                <strong>${ind.joueur == 0 ? 'Moi' : 'Joueur '+ind.joueur}</strong> : 
                <span class="badge ${ind.type==='negatif'?'bg-danger':'bg-info text-dark'}">${ind.type.replace('_',' ')}</span>
                <span class="ms-1">${ind.cartes.join(', ')}</span>
            </div>
        `).join('');
    }

    async function solve() {
        const btn = document.getElementById('solve_btn');
        const resArea = document.getElementById('result_area');
        const seuil = document.getElementById('seuil_range').value;
        const n = document.getElementById('n_joueurs').value;

        btn.disabled = true;
        resArea.innerHTML = '<div class="spinner-border text-primary" role="status"></div><br>Calcul des mondes possibles...';

        try {
            const response = await fetch('/solve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    indices: indices, 
                    n_joueurs: n, 
                    seuil: seuil
                })
            });
            const data = await response.json();
            
            if(data.status === "success") {
                let html = `<div class="badge-count mb-2">Solutions restantes : <span class="badge bg-dark">${data.count}</span></div>`;
                
                if(data.count === 1) {
                    const sol = data.hypotheses[0];
                    html = `<div class="text-success fw-bold">🎯 SOLUTION UNIQUE TROUVÉE !<br>
                            <span class="fs-4">${sol.coupable} + ${sol.arme} + ${sol.lieu}</span></div>`;
                    resArea.className = "alert alert-success solution-box shadow border-success";
                } else if(data.hypotheses.length > 0) {
                    html += `<div class="small fw-bold text-primary mt-2">Hypothèses probables :</div>`;
                    html += `<div class="hypothese-list"><ul class="list-group list-group-flush small">`;
                    data.hypotheses.forEach(h => {
                        html += `<li class="list-group-item bg-transparent">${h.coupable} / ${h.arme} / ${h.lieu}</li>`;
                    });
                    html += `</ul></div>`;
                    resArea.className = "alert alert-info solution-box shadow";
                } else {
                    html += `<div class="text-muted italic">Trop de solutions (> ${seuil}). Continuez à éliminer des cartes.</div>`;
                    resArea.className = "alert alert-info solution-box shadow-sm";
                }
                resArea.innerHTML = html;
            } else {
                resArea.className = "alert alert-danger solution-box shadow";
                resArea.innerHTML = "❌ <strong>Erreur : Conflit d'indices.</strong><br>Il est mathématiquement impossible que ces indices soient tous vrais.";
            }
        } catch(e) {
            resArea.innerHTML = "❌ Erreur de connexion au serveur.";
        } finally {
            btn.disabled = false;
        }
    }

    updatePlayersList();
</script>
</body>
</html>
